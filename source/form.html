<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Запись на стрижку</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" href="img/favicons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="img/favicons/apple.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preload" href="fonts/pt-sans-narrow.woff2" type="font/woff2" as="font" crossorigin="anonymous">
  <link rel="preload" href="fonts/pt-sans-narrow-bold.woff2" type="font/woff2" as="font" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <nav class="nav nav--closed nav--nojs">
    <button class="nav__toggle" type="button"><span class="visually-hidden">Открыть меню</span></button>
    <div class="nav__wrapper">
      <ul class="nav__list site-list">
        <li class="site-list__item">
          <a href="index.html">Главная</a>
        </li>
        <li class="site-list__item">
          <a href="photo.html">Наши работы</a>
        </li>
        <li class="site-list__item">
          <a href="form.html">Записаться</a>
        </li>
        <li class="site-list__item">
          <a href="#">Контакты</a>
        </li>
        <li class="site-list__item">
          <a href="https://htmlacademy.ru">HTML Academy</a>
        </li>
      </ul>
      <ul class="nav__list user-list">
        <li class="user-list__item">
          <a class="user-list__login js-login" href="#">
            Войти
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
<main>
  <h1>Запись на стрижку</h1>
  <a href="index.html">На главную</a>
  <fieldset>
    <input name="surname" placeholder="Фамилия">
    <input name="name" placeholder="Имя">
    <input name="patronymic" placeholder="Отчество">
    <input type="phone" name="phone" placeholder="Контактный телефон">
    <input type="email" name="email" placeholder="Контактный e-mail">
    <textarea name="Доп. информация для мастера" placeholder=""></textarea>
  </fieldset>
  <fieldset>
    <h2>Выберите модель бороды</h2>
    <input type="radio" name="beard-1" id="beard-1">
    <label for="beard-1">адмирал</label>
    <input type="radio" name="beard-2" id="beard-2">
    <label for="beard-2">лесоруб</label>
    <input type="radio" name="beard-3" id="beard-3">
    <label for="beard-3">полярник</label>
    <input type="radio" name="beard-4" id="beard-4">
    <label for="beard-4">боярин</label>
    <input type="radio" name="beard-5" id="beard-5">
    <label for="beard-5">мудрец</label>
  </fieldset>
  <fieldset>
    <h2>Дополнительные услуги</h2>
    <div>
      <input type="checkbox" name="extra" id="color-beard" value="color-beard">
      <label for="color-beard">Подкрасить бороду</label>
    </div>
    <div>
      <input type="checkbox" name="extra" id="wind-up-mustache" value="wind-up-mustache">
      <label for="wind-up-mustache">Накрутить усы</label>
    </div>
    <div>
      <input type="checkbox" name="extra" id="comb-beard" value="comb-beard">
      <label for="comb-beard">Причесать бороду</label>
    </div>
    <div>
      <input type="checkbox" name="extra" id="trim-temples" value="trim-temples">
      <label for="trim-temples">Подровнять виски</label>
    </div>
    <div>
      <input type="checkbox" name="extra" id="remove-gray-hair" value="remove-gray-hair">
      <label for="remove-gray-hair">Убрать седину</label>
    </div>
    <div>
      <input type="checkbox" name="extra" id="polish-bald-spot" value="polish-bald-spot">
      <label for="polish-bald-spot">Отполировать лысину</label>
    </div>
    <a class="button" href="#">Отправить заявку</a>
  </fieldset>
</main>
<footer>

</footer>
</body>
</html>
